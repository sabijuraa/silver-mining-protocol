name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Rust lint (only when program source exists) ────────────────────────────
  lint:
    name: Rust fmt + Clippy
    runs-on: ubuntu-latest
    if: hashFiles('contracts/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        working-directory: contracts
        run: cargo clippy --all-targets -- -D warnings

  # ── Anchor build (only when program source exists) ─────────────────────────
  build:
    name: Anchor build
    runs-on: ubuntu-latest
    if: hashFiles('contracts/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Solana toolchain
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: |
            ~/.local/share/solana
            ~/.config/solana
          key: solana-3.0.13

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.0.13/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Add Solana to PATH (cache hit)
        if: steps.cache-solana.outputs.cache-hit == 'true'
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache AVM + Anchor
        uses: actions/cache@v4
        id: cache-anchor
        with:
          path: |
            ~/.avm
            ~/.cargo/bin/anchor
            ~/.cargo/bin/avm
          key: anchor-0.31.0

      - name: Install Anchor via AVM
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.31.0
          avm use 0.31.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build program
        working-directory: contracts
        run: anchor build

  # ── Frontend (only when package.json + lockfile exist) ────────────────────
  frontend:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package-lock.json') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build